services:
  - type: web
    name: lupin-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: TRACKER_SHEET_ID
        sync: false
      - key: TRACKER_TAB
        sync: false
      - key: APPS_SCRIPT_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TICK_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # ── Email (SMTP) — optional. Render's free plan blocks outbound
      # SMTP on port 587, so the live delivery path is the Apps Script
      # MailApp fallback (uses the spreadsheet owner's Google account).
      # If you upgrade to a paid plan, set SMTP_USER + SMTP_PASSWORD to
      # a Gmail App Password (myaccount.google.com/apppasswords) and
      # emails go out via SMTP instead.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: Lupin Tracker
      - key: SMTP_FROM_ADDR
        sync: false
      - key: DASHBOARD_PUBLIC_URL
        value: https://lupin-tracker.onrender.com
