<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lupin Tracker — Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(135deg,#1b2a1b 0%,#274027 50%,#365c36 100%);color:#fff}
  .card{background:rgba(255,255,255,.07);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:40px 36px;
    width:360px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  h1{margin:0 0 6px;font-size:22px;font-weight:600;letter-spacing:.3px}
  .sub{margin:0 0 24px;font-size:13px;opacity:.7}
  label{display:block;font-size:12px;opacity:.8;margin-bottom:6px}
  input[type=password]{width:100%;padding:12px 14px;border-radius:8px;
    border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.25);color:#fff;
    font-size:14px;outline:none}
  input[type=password]:focus{border-color:#7cb342}
  button{width:100%;margin-top:18px;padding:12px;border-radius:8px;border:0;
    background:#558b2f;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
    transition:background .15s}
  button:hover{background:#33691e}
  .err{color:#ff8a80;font-size:12px;margin-top:12px;text-align:center}
</style>
</head>
<body>
  <form class="card" method="POST">
    <h1>🟢 Lupin Tracker</h1>
    <p class="sub">Month-wise &amp; therapy-wise content dashboard</p>
    <label for="pw">Password</label>
    <input id="pw" name="password" type="password" required autofocus>
    <button type="submit">Sign in</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
</body>
</html>
